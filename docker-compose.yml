# Local-only datastore services. Use this if you have Docker; otherwise the
# repo also runs against Homebrew-managed Postgres/Redis (see scripts/services.sh).
# Nothing here is deployed anywhere — it binds to localhost only.
services:
  postgres:
    image: postgres:16-alpine
    container_name: bandari-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bandari
      POSTGRES_PASSWORD: bandari
      POSTGRES_DB: bandari
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - bandari_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bandari -d bandari"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bandari-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - bandari_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bandari_pgdata:
  bandari_redisdata:
